backend:
  name: github
  repo: augustineynwa/rosehill-college-website
  branch: main
  base_url: https://rhc-cms-auth.fusion-588.workers.dev
  auth_endpoint: auth
  commit_messages:
    create: 'Website edit: create {{collection}} “{{slug}}”'
    update: 'Website edit: update {{collection}} “{{slug}}”'
    delete: 'Website edit: delete {{collection}} “{{slug}}”'
    uploadMedia: 'Website edit: upload {{path}}'
    deleteMedia: 'Website edit: delete {{path}}'
local_backend: true
media_folder: public/assets/img
public_folder: assets/img
publish_mode: simple
site_url: https://rosehill-college-website.pages.dev
logo_url: /assets/img/RHC-Official-Crest.svg
collections:
  - name: settings
    label: Site settings
    editor:
      preview: false
    files:
      - name: site
        label: Contact details, nav & footer
        file: content/site.json
        format: json
        fields:
          - label: 🔔 Urgent notice banner (homepage)
            name: notice
            widget: object
            hint: Shows a banner across the top of the homepage. Turn Show on, type the message, and Publish. Goes live in ~1–2 minutes.
            fields:
              - label: Show the banner
                name: active
                widget: boolean
                default: false
                hint: Turn OFF to take the banner down.
              - label: Level (sets the colour)
                name: level
                widget: select
                default: urgent
                options:
                  - label: Urgent (red)
                    value: urgent
                  - label: Important (gold)
                    value: important
                  - label: Notice (navy)
                    value: info
              - label: Message
                name: message
                widget: text
                required: false
                hint: Keep it short — one or two sentences.
              - label: Optional link
                name: link
                widget: object
                collapsed: true
                fields:
                  - label: Link text (e.g. Read more)
                    name: label
                    widget: string
                    required: false
                  - label: Link (e.g. /our-school/our-latest-news)
                    name: href
                    widget: string
                    required: false
              - label: Auto-hide after this date (optional)
                name: expires
                widget: datetime
                required: false
                date_format: YYYY-MM-DD
                time_format: false
                picker_utc: true
                hint: The banner disappears on its own after this date — so you can't forget to remove it.
          - label: School name
            name: name
            widget: string
            required: false
          - label: Motto (te reo Māori)
            name: motto
            widget: string
            required: false
          - label: Vision (English)
            name: vision
            widget: text
            required: false
          - label: Addresses
            name: address
            widget: object
            collapsed: true
            fields:
              - label: Physical address (one line per row)
                name: physical
                widget: list
                field:
                  label: Line
                  name: line
                  widget: string
                  required: false
              - label: Postal address
                name: postal
                widget: list
                field:
                  label: Line
                  name: line
                  widget: string
                  required: false
          - label: Contact
            name: contact
            widget: object
            collapsed: true
            fields:
              - label: Phone
                name: phone
                widget: string
                required: false
              - label: Phone link (tel:)
                name: phoneHref
                widget: string
                required: false
              - label: Fax
                name: fax
                widget: string
                required: false
              - label: Email
                name: email
                widget: string
                required: false
              - label: Attendance email
                name: attendanceEmail
                widget: string
                required: false
              - label: Attendance phone
                name: attendancePhone
                widget: string
                required: false
              - label: Attendance phone link (tel:)
                name: attendancePhoneHref
                widget: string
                required: false
          - label: External links
            name: external
            widget: object
            collapsed: true
            fields:
              - label: My RHC
                name: myRhc
                widget: string
                required: false
              - label: School app
                name: schoolApp
                widget: string
                required: false
              - label: Adult education
                name: adultEducation
                widget: string
                required: false
              - label: Facebook
                name: facebook
                widget: string
                required: false
              - label: Instagram
                name: instagram
                widget: string
                required: false
          - label: Main navigation
            name: nav
            widget: list
            collapsed: true
            label_singular: Menu item
            summary: '{{fields.label}}'
            fields:
              - label: Label
                name: label
                widget: string
                required: false
              - label: Link (leave blank if it has a dropdown)
                name: href
                widget: string
                required: false
              - label: Dropdown items
                name: children
                widget: list
                required: false
                collapsed: true
                summary: '{{fields.label}}'
                fields:
                  - label: Label
                    name: label
                    widget: string
                    required: false
                  - label: Link
                    name: href
                    widget: string
                    required: false
                  - label: Links to another website
                    name: external
                    widget: boolean
                    required: false
                    default: false
          - label: Footer quick links
            name: footerLinks
            widget: list
            collapsed: true
            summary: '{{fields.label}}'
            fields:
              - label: Label
                name: label
                widget: string
                required: false
              - label: Link
                name: href
                widget: string
                required: false
          - label: Copyright line
            name: copyright
            widget: string
            required: false
